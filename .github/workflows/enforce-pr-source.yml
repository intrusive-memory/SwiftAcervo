name: Enforce PR Source

on:
  pull_request:
    branches: [main]

jobs:
  enforce-source-branch:
    name: PR must come from development
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch is 'development'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ "$HEAD_REF" != "development" ]; then
            echo "::error::PRs into main must originate from the 'development' branch. This PR is from '$HEAD_REF'."
            exit 1
          fi
          echo "Source branch is 'development' — OK."
