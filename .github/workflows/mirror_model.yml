# Reusable GitHub Actions Workflow: Mirror AI Model to CDN
#
# Usage (in any org project):
#
#   name: Mirror Model to CDN
#   on:
#     workflow_dispatch:
#     push:
#       branches: [main]
#
#   jobs:
#     mirror:
#       uses: intrusive-memory/SwiftAcervo/.github/workflows/mirror_model.yml@main
#       with:
#         model_id: mlx-community/Qwen2.5-7B-Instruct-4bit
#       secrets: inherit
#
# All org secrets flow through automatically via `secrets: inherit`.

name: Mirror Model to CDN

on:
  workflow_call:
    inputs:
      model_id:
        required: true
        type: string
        description: HuggingFace model ID in org/repo format
      files:
        required: false
        type: string
        default: ""
        description: Space-separated file subset; omit to mirror all files
      acervo_version:
        required: false
        type: string
        default: "latest"
        description: Homebrew formula version (default latest)

jobs:
  mirror:
    runs-on: macos-26
    # Org secrets: R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_ENDPOINT, R2_BUCKET, HF_TOKEN
    secrets: inherit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install huggingface-cli
        run: brew install huggingface-hub

      - name: Install acervo
        run: brew install intrusive-memory/tap/acervo
        # Fallback: build from source per REQUIREMENTS-acervo-tool.md §12
        # If the Homebrew formula is not yet published:
        # - uses: actions/checkout@v4
        #   with:
        #     repository: intrusive-memory/SwiftAcervo
        # - run: make install-acervo
        # - run: ./bin/acervo ship "${{ inputs.model_id }}"

      - name: Mirror model to CDN
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "${{ inputs.files }}" ]; then
            acervo ship "${{ inputs.model_id }}" ${{ inputs.files }}
          else
            acervo ship "${{ inputs.model_id }}"
          fi
